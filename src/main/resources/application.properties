# The bolt URI and auth are wired programmatically in Neo4jConfig.
# Spring Data Neo4j still needs a URI to be happy; we use a placeholder
# that gets overridden by the driver bean we create manually.
spring.neo4j.uri=bolt://localhost:7687
spring.neo4j.authentication.username=neo4j
spring.neo4j.authentication.password=secret123

# Tell Spring Boot not to try auto-connecting before our bean is ready
spring.data.neo4j.repositories.type=none

# Server
spring.application.name=StudentGraphDB
server.port=8080

