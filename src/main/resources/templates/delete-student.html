<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Delete Student</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{fragments/header :: siteHeader}"></div>

<main class="page-content">
    <h1>Delete Student</h1>

    <h2>Current Students</h2>
    <table th:if="${not #lists.isEmpty(allStudents)}">
        <thead>
        <tr>
            <th>Matriculation Number</th>
            <th>Name</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="student : ${allStudents}">
            <td th:text="${student.matriculationNumber}"></td>
            <td th:text="${student.name}"></td>
        </tr>
        </tbody>
    </table>

    <h2>Delete by matriculation number</h2>
    <form method="post" th:action="@{/students/delete/by-matriculation}">
        <div>
            <label for="matriculationNumber">Matriculation Number</label><br>
            <input id="matriculationNumber" name="matriculationNumber" required type="text">
        </div>
        <br>
        <div>
            <label for="reason1">Reason</label><br>
            <input id="reason1" name="reason" required type="text">
        </div>
        <br>
        <button type="submit">Delete</button>
    </form>

    <h2>Delete by name</h2>
    <form method="post" th:action="@{/students/delete/by-name}">
        <div>
            <label for="name">Name</label><br>
            <input id="name" name="name" required type="text">
        </div>
        <br>
        <div>
            <label for="reason2">Reason</label><br>
            <input id="reason2" name="reason" required type="text">
        </div>
        <br>
        <button type="submit">Delete</button>
    </form>

    <div th:replace="~{fragments/popup-messages:: globalMessagePopup}"></div>

</main>
</body>
</html>
