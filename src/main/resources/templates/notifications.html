<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Notifications</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{fragments/header :: siteHeader}"></div>

<main class="page-content">
    <h1>Notifications </h1>
    <table th:if="${not #lists.isEmpty(allNotifications)}">
        <thead>
        <tr>
            <th>id</th>
            <th>deletedEntityType</th>
            <th>deletedEntityId</th>
            <th>message</th>
            <th>reason</th>
            <th>deletedAt</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="n: ${allNotifications}">
            <td th:text="${n.id}"></td>
            <td th:text="${n.deletedEntityType}"></td>
            <td th:text="${n.deletedEntityId}"></td>
            <td th:text="${n.message}"></td>
            <td th:text="${n.reason}"></td>
            <td th:text="${n.deletedAt}"></td>
        </tr>
        </tbody>
    </table>
</main>

<div th:replace="~{fragments/popup-messages :: globalMessagePopup}"></div>

</body>
</html>
